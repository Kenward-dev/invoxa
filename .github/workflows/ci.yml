name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --locked
        working-directory: backend

      - name: Run pre-commit hooks
        run: uv run --project backend pre-commit run --all-files --show-diff-on-failure

  backend-checks:
    name: Backend — Type Check & Tests
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: mypy
        run: uv run mypy app

      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key-for-ci-only
        run: uv run pytest --cov=app --cov-report=term-missing -q
